name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: content-repo

      - name: Clone Quartz
        run: git clone https://github.com/jackyzha0/quartz.git quartz-build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz dependencies
        run: cd quartz-build && npm ci

      - name: Copy content and config
        run: |
          cp -r content-repo/content/. quartz-build/content/
          cp content-repo/quartz.config.ts quartz-build/quartz.config.ts

      - name: Build Quartz
        run: cd quartz-build && npx quartz build
        env:
          FORCE_COLOR: 1

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-build/public/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
